<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Actions</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:       #0a0a0c;
  --card:     #111114;
  --border:   #1c1c21;
  --border2:  #26262d;
  --text:     #f0f0f5;
  --sub:      #6b6b80;
  --accent:   #6366f1;
  --accentbg: #6366f112;
  --green:    #22c55e;
  --greenbg:  #22c55e14;
  --red:      #f87171;
  --redbg:    #f8717114;
  --yellow:   #fbbf24;
  --yellowbg: #fbbf2414;
  --radius:   14px;
  --radiussm: 9px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  overscroll-behavior: none;
}

/* ── APP SHELL ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 10px;
  flex-shrink: 0;
}

.header-left { display:flex; align-items:center; gap:10px; }

.app-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.account-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 4px 10px 4px 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--sub);
  transition: border-color .15s;
  max-width: 140px;
}
.account-pill:hover { border-color: var(--accent); color: var(--text); }
.account-pill .avatar {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  display: flex; align-items:center; justify-content:center;
  flex-shrink: 0;
}
.account-pill .pill-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.icon-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--sub);
  font-size: 16px;
  display: flex; align-items:center; justify-content:center;
  cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.icon-btn.done { color: var(--green); border-color: var(--green); background: var(--greenbg); }

/* ── ACCOUNT DROPDOWN ── */
.acc-dropdown-wrap {
  position: relative;
}
.acc-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 200px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  z-index: 100;
  overflow: hidden;
}
.acc-dropdown.open { display: block; }
.acc-dropdown-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--sub);
  padding: 10px 12px 6px;
}
.account-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  cursor: pointer;
  transition: background .1s;
}
.account-row:hover { background: var(--border); }
.account-row.active { background: var(--accentbg); }
.account-row .av {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff; font-weight: 700; font-size: 12px;
  display: flex; align-items:center; justify-content:center;
  flex-shrink: 0;
}
.account-row .info { flex:1; min-width:0; }
.account-row .info .name { font-size: 13px; font-weight: 600; }
.account-row .info .handle { font-size: 11px; color: var(--sub); }
.account-row .check { color: var(--accent); font-size: 14px; }

/* ── SIMPLE FOOTER ── */
.footer {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  background: var(--card);
}
.footer-text {
  font-size: 11px;
  color: var(--sub);
  letter-spacing: .02em;
}


/* ── SETTINGS PANEL ── */
.settings-panel {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 60;
  transform: translateX(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
  max-width: 480px;
  left: 50%; margin-left: -240px;
}
@media (max-width:480px) {
  .settings-panel { left:0; margin-left:0; }
}
.settings-panel.open { transform: translateX(0); }

.settings-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.settings-header h2 { font-size: 17px; font-weight: 700; }
.settings-body { flex:1; overflow-y:auto; padding: 16px; }

.settings-section { margin-bottom: 24px; }
.settings-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--sub);
  margin-bottom: 10px;
  padding: 0 4px;
}

.saved-account-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 8px;
  display: flex; align-items:center; gap:12px;
}
.saved-account-card .av {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff; font-weight:700; font-size:16px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.saved-account-card .info { flex:1; min-width:0; }
.saved-account-card .name { font-size:14px; font-weight:600; }
.saved-account-card .handle { font-size:12px; color:var(--sub); margin-top:2px; }
.saved-account-card .remove {
  background:none; border:none; color:var(--sub);
  font-size:18px; cursor:pointer; padding:4px;
  border-radius:6px; transition:color .15s;
}
.saved-account-card .remove:hover { color:var(--red); }

.add-form {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.add-form .form-title {
  font-size: 14px; font-weight: 600;
  margin-bottom: 14px;
}
.field { margin-bottom: 12px; }
.field label { display:block; font-size:12px; color:var(--sub); margin-bottom:5px; }
.field input {
  width:100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radiussm);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--border2); }

.save-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: var(--radiussm);
  color: #fff;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
  margin-top: 4px;
}
.save-btn:hover { opacity:.85; }
.save-btn:disabled { opacity:.4; cursor:not-allowed; }

.pin-section { }
.pin-info { font-size:12px; color:var(--sub); margin-bottom:10px; line-height:1.5; padding:0 4px; }

.pin-repo-row {
  display: flex; align-items:center; justify-content:space-between;
  padding: 11px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radiussm);
  margin-bottom: 6px;
}
.pin-repo-name { font-size:13px; font-weight:500; }
.pin-repo-owner { font-size:11px; color:var(--sub); margin-top:1px; }
.toggle {
  width:42px; height:24px;
  background: var(--border2);
  border-radius: 12px;
  position:relative; cursor:pointer;
  transition: background .2s;
  flex-shrink:0;
  border:none;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content:'';
  position:absolute;
  top:3px; left:3px;
  width:18px; height:18px;
  border-radius:50%;
  background:#fff;
  transition: transform .2s;
}
.toggle.on::after { transform: translateX(18px); }

/* ── MAIN SCROLL ── */
.scroll-area {
  flex:1;
  overflow-y:auto;
  padding: 0 16px 8px;
  -webkit-overflow-scrolling: touch;
}

/* ── WORKFLOW CARDS ── */
.repo-group { margin-bottom: 20px; }
.repo-group-label {
  font-size:11px; font-weight:600;
  text-transform:uppercase; letter-spacing:.07em;
  color: var(--sub);
  margin-bottom: 8px;
  padding: 0 2px;
  display:flex; align-items:center; gap:6px;
}

.wf-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 8px;
  display:flex; align-items:center; gap:12px;
  transition: border-color .15s;
  position:relative;
  overflow:hidden;
}
.wf-card::before {
  content:'';
  position:absolute; left:0; top:0; bottom:0;
  width:3px;
  border-radius:3px 0 0 3px;
  background: var(--border2);
  transition: background .2s;
}
.wf-card.success::before { background: var(--green); }
.wf-card.failure::before { background: var(--red); }
.wf-card.running::before { background: var(--yellow); }

.wf-info { flex:1; min-width:0; }
.wf-name { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wf-meta { font-size:11px; color:var(--sub); margin-top:3px; display:flex; align-items:center; gap:6px; }
.status-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:10px; font-weight:600;
  padding:2px 7px; border-radius:5px;
  text-transform:uppercase; letter-spacing:.04em;
}
.status-badge.success { background:var(--greenbg); color:var(--green); }
.status-badge.failure { background:var(--redbg); color:var(--red); }
.status-badge.running { background:var(--yellowbg); color:var(--yellow); }
.status-badge.idle    { background:var(--border); color:var(--sub); }

.dot { width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0; }
.dot.running { background:var(--yellow); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

.run-btn {
  padding: 8px 16px;
  background: var(--accentbg);
  border: 1px solid var(--accent);
  border-radius: var(--radiussm);
  color: var(--accent);
  font-family: inherit;
  font-size:13px; font-weight:600;
  cursor:pointer;
  transition: all .15s;
  flex-shrink:0;
  white-space:nowrap;
}
.run-btn:hover { background:var(--accent); color:#fff; }
.run-btn:active { transform:scale(.96); }
.run-btn:disabled { opacity:.35; cursor:not-allowed; }

/* ── PER-CARD RUN LOG ── */
.wf-runlog {
  display: none;
  width: 100%;
  margin-top: 10px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radiussm);
  overflow: hidden;
}
.wf-runlog.open { display: block; }
.wf-runlog-inner {
  max-height: 120px;
  overflow-y: auto;
  padding: 8px 10px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11px;
  line-height: 1.8;
  color: var(--sub);
  -webkit-overflow-scrolling: touch;
}
.wf-runlog-line { display: flex; gap: 8px; }
.wf-runlog-line .lt { color: var(--border2); flex-shrink: 0; }
.wf-runlog-line.ok  .lm { color: var(--green); }
.wf-runlog-line.err .lm { color: var(--red); }
.wf-runlog-line.inf .lm { color: var(--sub); }
.wf-runlog-line.trg .lm { color: var(--accent); }

/* ── LOG BOX ── */
.log-wrap {
  flex-shrink:0;
  border-top: 1px solid var(--border);
  background: var(--card);
}
.log-header {
  display:flex; align-items:center; justify-content:space-between;
  padding: 8px 16px;
  cursor:pointer;
  user-select:none;
}
.log-header-left { display:flex;align-items:center;gap:8px; }
.log-title { font-size:12px; font-weight:600; color:var(--sub); }
.log-count {
  font-size:10px; font-weight:700;
  background:var(--border2); color:var(--sub);
  padding:1px 6px; border-radius:10px;
}
.log-toggle { font-size:11px; color:var(--sub); }
.log-body {
  height:0; overflow:hidden;
  transition: height .2s ease;
}
.log-body.open { height:140px; }
.log-inner {
  height:140px;
  overflow-y:auto;
  padding: 8px 16px 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size:11px;
  line-height:1.7;
  -webkit-overflow-scrolling:touch;
}
.log-line { display:flex; gap:8px; }
.log-time { color:var(--border2); flex-shrink:0; }
.log-line.ok .log-msg { color:var(--green); }
.log-line.err .log-msg { color:var(--red); }
.log-line.info .log-msg { color:var(--sub); }
.log-line.trigger .log-msg { color:var(--accent); }

/* ── EMPTY / LOADING ── */
.center-msg {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 60px 20px; gap:10px;
  color:var(--sub); text-align:center;
}
.center-msg .ic { font-size:32px; margin-bottom:4px; }
.center-msg strong { color:var(--text); font-size:15px; }
.center-msg p { font-size:13px; line-height:1.6; }

/* ── TOAST ── */
.toasts {
  position:fixed; bottom:0; left:50%;
  transform:translateX(-50%);
  width:100%; max-width:480px;
  padding:0 16px 60px;
  pointer-events:none;
  z-index:200;
  display:flex; flex-direction:column; gap:6px; align-items:stretch;
}
.toast {
  padding:10px 14px;
  border-radius:10px;
  font-size:13px; font-weight:500;
  border:1px solid;
  pointer-events:all;
  animation:toastin .2s ease;
}
.toast.ok  { background:var(--greenbg);  border-color:var(--green);  color:var(--green); }
.toast.err { background:var(--redbg);    border-color:var(--red);    color:var(--red); }
.toast.inf { background:var(--accentbg); border-color:var(--accent); color:var(--accent); }
@keyframes toastin { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ── SPINNER ── */
.spin { display:inline-block;width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .6s linear infinite; }
@keyframes sp { to{transform:rotate(360deg)} }

.loading-row {
  display:flex;align-items:center;gap:8px;
  padding:20px 0; color:var(--sub); font-size:13px;
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="app-title">Actions</div>
      <div class="acc-dropdown-wrap" id="dropdownWrap">
        <div class="account-pill" id="accountPill" onclick="toggleDropdown()">
          <div class="avatar" id="pillAvatar">?</div>
          <span class="pill-name" id="pillName">Select account</span>
          <span id="pillChevron" style="font-size:9px;margin-left:2px;color:var(--sub);">▾</span>
        </div>
        <div class="acc-dropdown" id="accDropdown">
          <div class="acc-dropdown-title">Switch Account</div>
          <div id="dropdownList"></div>
        </div>
      </div>
    </div>
    <button class="icon-btn" id="gearBtn" onclick="openSettings()">⚙</button>
  </div>

  <!-- WORKFLOWS SCROLL -->
  <div class="scroll-area" id="scrollArea">
    <div class="center-msg" id="emptyMsg">
      <div class="ic">⚡</div>
      <strong>No account selected</strong>
      <p>Tap ⚙ to add your GitHub accounts</p>
    </div>
  </div>

  <!-- LOG BOX -->
  <div class="log-wrap">
    <div class="log-header" onclick="toggleLog()">
      <div class="log-header-left">
        <span class="log-title">ACTIVITY LOG</span>
        <span class="log-count" id="logCount">0</span>
      </div>
      <span class="log-toggle" id="logToggle">▲</span>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-inner" id="logInner"></div>
    </div>
  </div>

  <!-- SIMPLE FOOTER -->
  <div class="footer">
    <span class="footer-text">GitHub Actions Dashboard</span>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h2>Settings</h2>
    <button class="icon-btn" id="settingsCloseBtn" onclick="closeSettings()">✕</button>
  </div>
  <div class="settings-body">

    <!-- Saved accounts -->
    <div class="settings-section">
      <div class="settings-label">Accounts</div>
      <div id="savedAccountsList"></div>

      <!-- Add form -->
      <div class="add-form">
        <div class="form-title">Add GitHub Account</div>
        <div class="field">
          <label>Label</label>
          <input type="text" id="fLabel" placeholder="e.g. Main, Bot Account">
        </div>
        <div class="field">
          <label>Personal Access Token</label>
          <input type="password" id="fToken" placeholder="github_pat_...">
        </div>
        <button class="save-btn" id="addBtn" onclick="addAccount()">Add Account</button>
      </div>
    </div>

    <!-- Pin repos -->
    <div class="settings-section" id="pinSection" style="display:none">
      <div class="settings-label">Pinned Repos</div>
      <div class="pin-info">Sirf pinned repos ki workflows dikhegi. Sab off = sab dikhe.</div>
      <div id="pinList"></div>
    </div>

  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
// ── STATE ────────────────────────────────────────────────────
function lsGet(key, def) { try { return localStorage.getItem(key) ?? def; } catch(e) { return def; } }
function lsSet(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }

let accounts   = JSON.parse(lsGet('gh_v2_accounts', '[]'));
let pins       = JSON.parse(lsGet('gh_v2_pins',     '{}'));
let activeIdx  = parseInt(lsGet('gh_v2_active',     '-1'));
let allRepos   = [];   // fetched repos for active account
let logOpen    = false;
let logLines   = [];

if (activeIdx >= accounts.length) activeIdx = accounts.length > 0 ? 0 : -1;

// ── SAVE ─────────────────────────────────────────────────────
function save() {
  lsSet('gh_v2_accounts', JSON.stringify(accounts));
  lsSet('gh_v2_pins',     JSON.stringify(pins));
  lsSet('gh_v2_active',   String(activeIdx));
}

// ── LOG ──────────────────────────────────────────────────────
function log(msg, type='info') {
  const now = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logLines.push({time:now, msg, type});
  if (logLines.length > 200) logLines.shift();
  renderLog();
}
function renderLog() {
  const el = document.getElementById('logInner');
  el.innerHTML = logLines.slice(-80).map(l =>
    `<div class="log-line ${l.type}"><span class="log-time">${l.time}</span><span class="log-msg">${escH(l.msg)}</span></div>`
  ).join('');
  el.scrollTop = el.scrollHeight;
  document.getElementById('logCount').textContent = logLines.length;
}
function toggleLog() {
  logOpen = !logOpen;
  document.getElementById('logBody').classList.toggle('open', logOpen);
  document.getElementById('logToggle').textContent = logOpen ? '▼' : '▲';
}
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

// ── TOAST ────────────────────────────────────────────────────
function toast(msg, type='inf', ms=3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ── DROPDOWN ─────────────────────────────────────────────────
function toggleDropdown() {
  if (!accounts.length) { openSettings(); return; }
  const dd = document.getElementById('accDropdown');
  const isOpen = dd.classList.contains('open');
  if (isOpen) { closeDropdown(); } else { renderDropdown(); dd.classList.add('open'); }
}
function closeDropdown() {
  document.getElementById('accDropdown').classList.remove('open');
}
function renderDropdown() {
  document.getElementById('dropdownList').innerHTML = accounts.map((a,i) => `
    <div class="account-row ${i===activeIdx?'active':''}" onclick="switchAccount(${i})">
      <div class="av">${a.label[0].toUpperCase()}</div>
      <div class="info">
        <div class="name">${escH(a.label)}</div>
        <div class="handle">@${escH(a.username||'...')}</div>
      </div>
      ${i===activeIdx ? '<span class="check">✓</span>' : ''}
    </div>
  `).join('');
}
// Close dropdown on outside click
document.addEventListener('click', function(e) {
  const wrap = document.getElementById('dropdownWrap');
  if (wrap && !wrap.contains(e.target)) closeDropdown();
});

// ── SETTINGS ─────────────────────────────────────────────────
function openSettings() {
  renderSavedAccounts();
  renderPinList();
  document.getElementById('settingsPanel').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
  // gear turns green if at least one account saved
  const gear = document.getElementById('gearBtn');
  gear.classList.toggle('done', accounts.length > 0);
}

function renderSavedAccounts() {
  const el = document.getElementById('savedAccountsList');
  if (!accounts.length) { el.innerHTML=''; return; }
  el.innerHTML = accounts.map((a,i) => `
    <div class="saved-account-card">
      <div class="av">${a.label[0].toUpperCase()}</div>
      <div class="info">
        <div class="name">${escH(a.label)}</div>
        <div class="handle">@${escH(a.username||'unknown')} &nbsp;·&nbsp; ${a.token.slice(0,10)}…</div>
      </div>
      <button class="remove" onclick="removeAccount(${i})">✕</button>
    </div>
  `).join('');
}

function renderPinList() {
  const sec = document.getElementById('pinSection');
  const el  = document.getElementById('pinList');
  if (!allRepos.length) { sec.style.display='none'; return; }
  sec.style.display = 'block';
  const accPins = pins[activeIdx] || {};
  el.innerHTML = allRepos.map(r => `
    <div class="pin-repo-row">
      <div>
        <div class="pin-repo-name">${escH(r.name)}</div>
        <div class="pin-repo-owner">${escH(r.full_name)}</div>
      </div>
      <button class="toggle ${accPins[r.full_name]?'on':''}"
        onclick="togglePin('${r.full_name}', this)"></button>
    </div>
  `).join('');
}

function togglePin(fullName, btn) {
  if (!pins[activeIdx]) pins[activeIdx] = {};
  pins[activeIdx][fullName] = !pins[activeIdx][fullName];
  btn.classList.toggle('on', pins[activeIdx][fullName]);
  save();
  loadWorkflows();
}

// ── ADD ACCOUNT ──────────────────────────────────────────────
async function addAccount() {
  const label = document.getElementById('fLabel').value.trim();
  const token = document.getElementById('fToken').value.trim();
  if (!label || !token) { toast('Label aur token dono chahiye', 'err'); return; }

  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>  Verifying…';
  log(`Verifying token for "${label}"…`);

  try {
    const r = await ghFetch('https://api.github.com/user', token);
    if (!r.ok) throw new Error('Invalid token — GitHub ne reject kiya');
    const user = await r.json();

    accounts.push({ label, username: user.login, token });
    activeIdx = accounts.length - 1;
    save();
    renderSavedAccounts();
    updatePill();
    closeSettings();
    toast(`✓ ${user.login} added`, 'ok');
    log(`Account added: @${user.login}`, 'ok');
    loadWorkflows();
    document.getElementById('fLabel').value = '';
    document.getElementById('fToken').value = '';
  } catch(e) {
    toast(e.message, 'err', 5000);
    log(e.message, 'err');
  }

  btn.disabled = false;
  btn.textContent = 'Add Account';
}

function removeAccount(idx) {
  if (!confirm(`"${accounts[idx].label}" remove karo?`)) return;
  log(`Account removed: ${accounts[idx].label}`);
  accounts.splice(idx, 1);
  if (activeIdx >= accounts.length) activeIdx = accounts.length - 1;
  save();
  renderSavedAccounts();
  updatePill();
  if (activeIdx >= 0) loadWorkflows(); else showEmpty();
}

// ── SWITCH ACCOUNT ───────────────────────────────────────────
function switchAccount(idx) {
  activeIdx = idx;
  save();
  closeDropdown();
  updatePill();
  loadWorkflows();
}

function updatePill() {
  const pill   = document.getElementById('accountPill');
  const av     = document.getElementById('pillAvatar');
  const nm     = document.getElementById('pillName');
  const gear   = document.getElementById('gearBtn');

  if (activeIdx < 0 || !accounts[activeIdx]) {
    av.textContent = '?'; nm.textContent = 'Select account';
    gear.classList.remove('done');
    return;
  }
  const a = accounts[activeIdx];
  av.textContent  = a.label[0].toUpperCase();
  nm.textContent  = a.label;
  gear.classList.toggle('done', accounts.length > 0);
}

// ── GITHUB API ───────────────────────────────────────────────
function ghFetch(url, token, opts={}) {
  return fetch(url, { ...opts, headers: {
    'Authorization': `Bearer ${token}`,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    ...(opts.headers||{})
  }});
}

// ── LOAD WORKFLOWS ───────────────────────────────────────────
async function loadWorkflows() {
  if (activeIdx < 0 || !accounts[activeIdx]) { showEmpty(); return; }
  const acc   = accounts[activeIdx];
  const area  = document.getElementById('scrollArea');
  const accPins = pins[activeIdx] || {};
  const hasPins = Object.values(accPins).some(Boolean);

  area.innerHTML = `<div class="loading-row"><span class="spin"></span> Loading workflows…</div>`;
  log(`Fetching repos for @${acc.username}…`);

  try {
    const rr = await ghFetch(`https://api.github.com/user/repos?per_page=100&sort=updated`, acc.token);
    if (!rr.ok) throw new Error(`Repos fetch failed (${rr.status})`);
    let repos = await rr.json();

    allRepos = repos;
    renderPinList(); // update settings pin list

    // filter by pins if any pinned
    if (hasPins) repos = repos.filter(r => accPins[r.full_name]);

    const groups = [];
    for (const repo of repos.slice(0, 40)) {
      try {
        const wr = await ghFetch(`https://api.github.com/repos/${repo.full_name}/actions/workflows`, acc.token);
        if (!wr.ok) continue;
        const wd = await wr.json();
        if (!wd.workflows?.length) continue;

        const wfs = [];
        for (const wf of wd.workflows) {
          if (wf.state !== 'active') continue; // skip disabled workflows
          let lastRun = null;
          try {
            const lr = await ghFetch(`https://api.github.com/repos/${repo.full_name}/actions/workflows/${wf.id}/runs?per_page=1`, acc.token);
            if (lr.ok) { const d = await lr.json(); lastRun = d.workflow_runs?.[0]||null; }
          } catch(_) {}
          wfs.push({...wf, lastRun});
        }
        if (!wfs.length) continue;
        groups.push({repo, wfs});
        log(`${repo.name}: ${wfs.length} workflow(s)`, 'ok');
      } catch(e) { log(`${repo.name}: skip (${e.message})`, 'err'); }
    }

    renderGroups(groups, acc);
  } catch(e) {
    area.innerHTML = `<div class="center-msg"><div class="ic">⚠️</div><strong>Load failed</strong><p>${escH(e.message)}</p></div>`;
    log(e.message, 'err');
  }
}

function renderGroups(groups, acc) {
  const area = document.getElementById('scrollArea');
  if (!groups.length) {
    area.innerHTML = `<div class="center-msg"><div class="ic">🔍</div><strong>No workflows found</strong><p>Repos mein .github/workflows/ files nahi hain, ya sab repos unpin hain.</p></div>`;
    return;
  }
  area.innerHTML = groups.map(({repo, wfs}) => `
    <div class="repo-group">
      <div class="repo-group-label">
        <span>📁</span>${escH(repo.name)}
        <span style="font-weight:400;color:var(--border2)">${escH(repo.default_branch)}</span>
      </div>
      ${wfs.map(wf => wfCard(wf, repo, acc)).join('')}
    </div>
  `).join('');
}

function wfCard(wf, repo, acc) {
  const status = getStatus(wf.lastRun);
  const cardId = `c-${repo.id}-${wf.id}`;
  const logId  = `log-${repo.id}-${wf.id}`;
  return `
    <div class="wf-card ${status.cls}" id="${cardId}" style="flex-direction:column;align-items:stretch;gap:0;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="wf-info">
          <div class="wf-name">${escH(wf.name)}</div>
          <div class="wf-meta">
            <span class="status-badge ${status.cls}">
              ${status.cls==='running'?'<span class="dot running"></span>':''}
              ${status.label}
            </span>
            <span>${status.time}</span>
          </div>
        </div>
        <button class="run-btn" onclick="triggerWf('${repo.full_name}',${wf.id},'${escH(wf.name)}','${repo.default_branch}','${acc.token}','${cardId}','${logId}')">
          Run
        </button>
      </div>
      <div class="wf-runlog" id="${logId}">
        <div class="wf-runlog-inner" id="${logId}-inner"></div>
      </div>
    </div>
  `;
}

function getStatus(run) {
  if (!run) return {cls:'idle', label:'Never run', time:''};
  if (run.status==='in_progress'||run.status==='queued')
    return {cls:'running', label:'Running', time:timeAgo(run.updated_at)};
  if (run.conclusion==='success')
    return {cls:'success', label:'Success', time:timeAgo(run.updated_at)};
  if (run.conclusion==='failure')
    return {cls:'failure', label:'Failed', time:timeAgo(run.updated_at)};
  return {cls:'idle', label: run.conclusion||run.status, time:timeAgo(run.updated_at)};
}

// ── TRIGGER ──────────────────────────────────────────────────
function cardLog(logId, msg, type='inf') {
  const box   = document.getElementById(logId);
  const inner = document.getElementById(`${logId}-inner`);
  if (!box || !inner) return;
  box.classList.add('open');
  const now = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  inner.innerHTML += `<div class="wf-runlog-line ${type}"><span class="lt">${now}</span><span class="lm">${escH(msg)}</span></div>`;
  inner.scrollTop = inner.scrollHeight;
  log(msg, type); // also mirror to global log
}

async function pollRunStatus(repoFull, wfId, token, cardId, logId, startedAfter) {
  const maxWait = 30; // poll for 30 attempts (5 min)
  for (let i = 0; i < maxWait; i++) {
    await new Promise(r => setTimeout(r, 10000)); // every 10s
    try {
      const r = await ghFetch(
        `https://api.github.com/repos/${repoFull}/actions/workflows/${wfId}/runs?per_page=3`,
        token
      );
      if (!r.ok) continue;
      const d = await r.json();
      const run = d.workflow_runs?.find(r => new Date(r.created_at) >= startedAfter);
      if (!run) { cardLog(logId, `Waiting for run to appear… (${i+1})`, 'inf'); continue; }

      const s = run.status;
      const c = run.conclusion;
      cardLog(logId, `Status: ${s}${c ? ' → ' + c : ''}`, s==='completed' ? (c==='success'?'ok':'err') : 'inf');

      if (s === 'completed') {
        const card = document.getElementById(cardId);
        card?.classList.remove('running','idle','failure','success');
        card?.classList.add(c==='success'?'success':'failure');
        const badge = card?.querySelector('.status-badge');
        if (badge) {
          badge.className = `status-badge ${c==='success'?'success':'failure'}`;
          badge.textContent = c==='success' ? 'Success' : 'Failed';
        }
        cardLog(logId, c==='success' ? '✓ Run completed successfully' : '✗ Run failed', c==='success'?'ok':'err');
        return;
      }
    } catch(e) { cardLog(logId, `Poll error: ${e.message}`, 'err'); }
  }
  cardLog(logId, 'Polling stopped — check GitHub for final status', 'inf');
}

async function triggerWf(repoFull, wfId, wfName, branch, token, cardId, logId) {
  const card = document.getElementById(cardId);
  const btn  = card?.querySelector('.run-btn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spin"></span>'; }

  cardLog(logId, `Triggering on ${repoFull} @ ${branch}…`, 'trg');

  try {
    const startedAfter = new Date();
    const r = await ghFetch(
      `https://api.github.com/repos/${repoFull}/actions/workflows/${wfId}/dispatches`,
      token,
      { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ref:branch}) }
    );
    if (r.status===204) {
      toast(`▶ ${wfName} triggered!`, 'ok');
      cardLog(logId, '✓ Triggered — waiting for runner…', 'ok');
      card?.classList.remove('success','failure','idle');
      card?.classList.add('running');
      const badge = card?.querySelector('.status-badge');
      if (badge) { badge.className='status-badge running'; badge.textContent='Running'; }
      if (btn) { btn.disabled=false; btn.textContent='Run'; }
      pollRunStatus(repoFull, wfId, token, cardId, logId, startedAfter);
    } else {
      const err = await r.json().catch(()=>({}));
      throw new Error(err.message || `HTTP ${r.status} — workflow_dispatch enabled hai YAML mein?`);
    }
  } catch(e) {
    toast(e.message, 'err', 6000);
    cardLog(logId, `✗ ${e.message}`, 'err');
    if (btn) { btn.disabled=false; btn.textContent='Run'; }
  }
}

// ── UTILS ─────────────────────────────────────────────────────
function timeAgo(d) {
  const s = (Date.now()-new Date(d))/1000;
  if (s<60) return 'just now';
  if (s<3600) return `${Math.floor(s/60)}m ago`;
  if (s<86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function showEmpty() {
  document.getElementById('scrollArea').innerHTML = `
    <div class="center-msg">
      <div class="ic">⚡</div>
      <strong>No account selected</strong>
      <p>Tap ⚙ to add your GitHub accounts</p>
    </div>`;
}

// ── INIT ─────────────────────────────────────────────────────
updatePill();
if (activeIdx >= 0 && accounts[activeIdx]) {
  loadWorkflows();
} else {
  showEmpty();
}
</script>
